name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" LLMime/Info.plist

      - name: Import signing certificate
        env:
          SIGNING_CERTIFICATE_P12: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 900 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$SIGNING_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build
        run: swift build -c release

      - name: Package .app
        run: |
          APP=/tmp/LLMime.app
          BINARY=$(find .build -name LLMime -type f ! -path "*.dSYM*" | head -1)
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BINARY" "$APP/Contents/MacOS/LLMime"
          cp LLMime/Info.plist "$APP/Contents/Info.plist"
          BUNDLE=$(find .build -name "LLMime_LLMime.bundle" -type d | head -1)
          [ -n "$BUNDLE" ] && cp -R "$BUNDLE/"* "$APP/Contents/Resources/" 2>/dev/null || true
          ICON_SRC="LLMime/Assets.xcassets/AppIcon.appiconset"
          if [ -d "$ICON_SRC" ]; then
            ICONSET=/tmp/AppIcon.iconset
            mkdir -p "$ICONSET"
            cp "$ICON_SRC/icon_16.png"     "$ICONSET/icon_16x16.png"
            cp "$ICON_SRC/icon_32.png"     "$ICONSET/icon_16x16@2x.png"
            cp "$ICON_SRC/icon_32.png"     "$ICONSET/icon_32x32.png"
            cp "$ICON_SRC/icon_32@2x.png"  "$ICONSET/icon_32x32@2x.png"
            cp "$ICON_SRC/icon_128.png"    "$ICONSET/icon_128x128.png"
            cp "$ICON_SRC/icon_256.png"    "$ICONSET/icon_128x128@2x.png"
            cp "$ICON_SRC/icon_256.png"    "$ICONSET/icon_256x256.png"
            cp "$ICON_SRC/icon_512.png"    "$ICONSET/icon_256x256@2x.png"
            cp "$ICON_SRC/icon_512.png"    "$ICONSET/icon_512x512.png"
            cp "$ICON_SRC/icon_512@2x.png" "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"
          fi
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/signing.keychain-db | grep "LLMime Dev" | head -1 | awk -F'"' '{print $2}')
          if [ -n "$IDENTITY" ]; then
            codesign --force --deep --sign "$IDENTITY" "$APP"
          else
            echo "Warning: LLMime Dev not found, falling back to ad-hoc"
            codesign --force --deep --sign - "$APP"
          fi
          cd /tmp && ditto -c -k --keepParent LLMime.app LLMime.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/LLMime.zip
          generate_release_notes: true
